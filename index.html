<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    <style>
        body {
            margin: 0;
            background: #f9f9f9;
            color: #333;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .captcha-box {
            background: #fff;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.05);
            width: 300px;
        }
        .checkbox-box {
            width: 24px;
            height: 24px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: #fff;
            position: relative;
        }
        .checkmark {
            display: none;
            position: absolute;
            left: 8px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid #009688;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
        .text {
            font-size: 14px;
            flex-grow: 1;
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="captcha-box" onclick="verify()">
        <div class="checkbox-box">
            <div class="checkmark" id="check"></div>
        </div>
        <div class="text">I'm not a robot</div>
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="30" height="30" alt="reCAPTCHA">
    </div>

    <script>
        function verify() {
            document.getElementById('check').style.display = 'block';
            setTimeout(() => {
                document.body.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" 
                        allow="autoplay; encrypted-media" 
                        allowfullscreen>
                    </iframe>
                `;
            }, 500);
        }
    </script>
</body>
</html>
